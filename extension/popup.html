<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indelible Wallet</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="header-logo">
        <div class="header-logo-icon">
          <svg viewBox="0 0 20 20" fill="none">
            <circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="1.5"/>
            <path d="M2 10h16M10 2c-2.5 2.5-4 5.5-4 8s1.5 5.5 4 8c2.5-2.5 4-5.5 4-8s-1.5-5.5-4-8z" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </div>
        <span class="header-title">Indelible Wallet</span>
      </div>
      <div class="header-status">
        <span class="header-status-dot"></span>
        <span class="header-status-text">Extension Active</span>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main" id="main-content">
      <!-- Loading State -->
      <div class="loading" id="loading-state">
        <div class="spinner"></div>
      </div>

      <!-- Connect State -->
      <div class="connect-state" id="connect-state" style="display: none;">
        <div class="connect-icon">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M21 12V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2h14a2 2 0 002-2v-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M16 2v4M8 2v4M3 10h18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h2 class="connect-title">Connect Your Wallet</h2>
        <p class="connect-subtitle">Connect your wallet to manage your dApp connections and view your balance</p>
        <button class="btn btn-primary" id="connect-btn">
          <svg viewBox="0 0 20 20" fill="none">
            <path d="M10 2a8 8 0 100 16 8 8 0 000-16z" stroke="currentColor" stroke-width="1.5"/>
            <path d="M6.5 10h7M10 6.5v7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          Connect Wallet
        </button>
      </div>

      <!-- Dashboard State -->
      <div class="dashboard-state" id="dashboard-state" style="display: none;">
        <!-- Wallet Card -->
        <div class="wallet-card">
          <div class="wallet-header">
            <div class="wallet-info">
              <div class="wallet-avatar" id="wallet-avatar">0x</div>
              <div class="wallet-details">
                <div class="wallet-address">
                  <span class="wallet-address-text" id="wallet-address">0x1234...5678</span>
                  <button class="copy-btn" id="copy-btn" title="Copy address">
                    <svg viewBox="0 0 16 16" fill="none">
                      <rect x="5" y="5" width="9" height="9" rx="1" stroke="currentColor" stroke-width="1.5"/>
                      <path d="M3 11V3a1 1 0 011-1h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                  </button>
                </div>
                <span class="wallet-network" id="wallet-network">
                  <span class="network-dot"></span>
                  Ethereum
                </span>
              </div>
            </div>
          </div>
          <div class="wallet-balance">
            <div class="balance-label">Balance</div>
            <div>
              <span class="balance-value" id="wallet-balance">0.00</span>
              <span class="balance-currency">ETH</span>
            </div>
          </div>
        </div>

        <!-- Connected Dapps -->
        <div class="dapps-section">
          <div class="section-header">
            <span class="section-title">Connected Dapps</span>
            <span class="section-count" id="dapp-count">0</span>
          </div>
          <div class="dapps-list" id="dapps-list">
            <div class="no-dapps">No connected dapps yet</div>
          </div>
        </div>

        <!-- Disconnect -->
        <div class="disconnect-section">
          <button class="btn btn-danger" id="disconnect-btn" style="width: 100%;">
            <svg viewBox="0 0 20 20" fill="none">
              <path d="M13.333 6.667L10 10m0 0l3.333 3.333M10 10l3.333-3.333M6.667 4.167H4.167a1.667 1.667 0 00-1.667 1.666v8.334a1.667 1.667 0 001.667 1.666h2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Disconnect Wallet
          </button>
        </div>
      </div>
    </main>

    <!-- Toast -->
    <div class="toast" id="toast">Copied to clipboard!</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
